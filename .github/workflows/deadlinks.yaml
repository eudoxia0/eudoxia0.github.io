name: dead links
on:
  - push
  - workflow_dispatch

jobs:
  link-checker:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: install ruby
        uses: ruby/setup-ruby@d5126b9b3579e429dd52e51e68624dda2e05be25 # v1.267.0
        with:
          ruby-version: "3.3.10"
          bundler-cache: true

      - name: build
        run: bundle exec jekyll build

      - name: check links
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2.8.0
        with:
          args: >
            --accept 200,201,202,203,204,206,300,301,302,303,304,307,308,403,429,999
            --exclude="antipope\.org"
            --exclude="dreamwidth\.org"
            --exclude="fredkozlowski\.com"
            --exclude="langsec\.org"
            --exclude="www\.gnu\.org"
            --fallback-extensions=html
            --host-concurrency=1
            --max-concurrency=32
            --max-retries=6
            --no-progress
            --retry-wait-time=6
            --root-dir=_site
            --suggest
            --threads=2
            --timeout=30
            --verbose
            './_site/**/*.html'
          fail: true
